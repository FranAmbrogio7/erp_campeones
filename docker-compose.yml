version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: campeones_db_container
    restart: always
    environment:
      # Docker creará automáticamente esta BD y usuario al iniciar por primera vez
      MYSQL_DATABASE: campeones_db
      MYSQL_USER: campeones_user
      MYSQL_PASSWORD: 44295023
      MYSQL_ROOT_PASSWORD: super_root_password # Contraseña maestra de seguridad
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: campeones_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      # ¡AQUÍ ESTÁ LA MAGIA! Le decimos a tu config.py que el host ahora se llama "db"
      - DB_HOST=db
      - DB_USER=campeones_user
      - DB_PASSWORD=0044295023
      - DB_NAME=campeones_db
      - FLASK_APP=run.py # Cambia esto si tu archivo principal se llama app.py o main.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: campeones_frontend
    restart: always
    ports:
      - "5173:5173" # Asumiendo que usas Vite. Si usas Create React App, pon "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data: # Esto guarda tu BD para que no se borre si apagas la PC
